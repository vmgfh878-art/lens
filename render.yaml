services:
  - type: web
    name: lens-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health/live
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false

  - type: cron
    name: lens-daily-market-sync
    runtime: python
    plan: starter
    schedule: "30 22 * * 1-5"
    buildCommand: pip install -r backend/requirements.txt && pip install -r backend/collector/requirements.txt
    startCommand: python -m backend.collector.pipelines.daily_market_sync --indicator-lookback-days 60
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: EODHD_API_KEY
        sync: false
