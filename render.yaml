services:
  - type: web
    name: lens-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health/live
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: BACKEND_CORS_ORIGINS
        sync: false
      # v1 local-parquet 모드는 Supabase 없어도 동작.
      # Supabase 사용 시 아래 두 키를 Render dashboard 에서 설정.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

