name: Daily Data Sync

on:
  workflow_dispatch:
  schedule:
    # 기본값: 매일 07:30 KST 부근에 실행되도록 설정
    - cron: "30 22 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SOURCE_DB_HOST: ${{ secrets.SOURCE_DB_HOST }}
      SOURCE_DB_PORT: ${{ secrets.SOURCE_DB_PORT }}
      SOURCE_DB_USER: ${{ secrets.SOURCE_DB_USER }}
      SOURCE_DB_PASSWORD: ${{ secrets.SOURCE_DB_PASSWORD }}
      SOURCE_DB_NAME: ${{ secrets.SOURCE_DB_NAME }}
      SOURCE_DB_SSLMODE: ${{ secrets.SOURCE_DB_SSLMODE }}
      SOURCE_SSH_HOST: ${{ secrets.SOURCE_SSH_HOST }}
      SOURCE_SSH_PORT: ${{ secrets.SOURCE_SSH_PORT }}
      SOURCE_SSH_USER: ${{ secrets.SOURCE_SSH_USER }}
      SOURCE_SSH_PRIVATE_KEY: ${{ secrets.SOURCE_SSH_PRIVATE_KEY }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r db/requirements-sync.txt

      - name: 원본 DB 동기화 실행
        run: |
          python db/07_sync_source_to_lens.py --indicator-lookback-days 2400
